- name: variables from prompt
  hosts: localhost
  connection: local
  become: yes
  vars_prompt:
    - name: username # username is variable input will be stored here
      prompt: what is your username?
      private: false
    - name: password
      prompt: what is your password?
      private: true

  tasks:
    - name: Printing inputs
      ansible.builtin.debug:
        msg: "Hi, {{ username }} Your are password is {{ password }}"