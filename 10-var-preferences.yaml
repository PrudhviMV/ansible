- name: checking preference for variables
  hosts: localhost
  connection: local
  become: yes
  vars:
    NAME: from play level
  vars_prompt:
    - name: input
      prompt: what is your input?
      private: false
  vars_files:
    - course.yaml

  tasks:
  - name: checking var preference level
    vars:
      NAME: from task level
    ansible.builtin.debug:
      msg: "{{ NAME }}"  