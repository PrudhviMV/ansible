- name: functions
  hosts: localhost
  connection: local
  become: yes
  vars:
    technologies: DevOps, linux, ansible, shell
    tags:
      Application: payment
      Environment: dev
    listTags:
    - key: Application
      value: payment
    - key: Environment
      value: dev

  tasks:
  - name: functions learn
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Ramesh') }}"

  #tasks:
  - name: split string into list
    ansible.builtin.debug:
      msg: "Technologies are: {{ technologies | split(',') }}"  

  #tasks:
  - name: convert dcit2 list
    ansible.builtin.debug:
      msg: "{{ tags|dict2items }}"

  #tasks:
  - name: convert list 2 dict
    ansible.builtin.debug:
      msg: "{{ listTags|items2dict }}"
  
  - name: Read yaml and take into variable
    ansible.builtin.set_fact:
      student_yaml: "{{ lookup('file','student.yaml') | from_yaml }}"

  - name: convert yaml into json
    ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json }}"