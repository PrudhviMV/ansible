- name: error handling
  hosts: localhost
  connection: local
  become: yes

  tasks:
  - name: check user
    ansible.builtin.command: id roboshop
    register: user_output

  - name: print user_output
    ansible.builtin.debug:
      msg: "{{ user_output }}"

  - name: check status and create user
    ansible.builtin.command: useradd roboshop
    when: user_output != 0