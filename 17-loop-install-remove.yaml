- name: install and remove in loop
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: install and remove packages
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
        - { name: "nginx", state: "absent"}
        - { name: "mysql", state: "absent"}
        - { name: "redis", state: "absent"}
        - { name: "zip", state: "absent"}
        - { name: "kafka", state: "present"}